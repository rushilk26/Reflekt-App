<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Reflekt</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#F5F0E8;color:#2D1F14;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#FAF7F2;border:1px solid #D9CEBD;border-radius:16px;padding:48px 40px;max-width:380px;width:100%;box-shadow:0 8px 30px rgba(45,31,20,0.12);text-align:center}
    .brand{font-family:'Lora',serif;font-size:28px;font-weight:600;color:#2D1F14;margin-bottom:6px}
    .subtitle{font-size:14px;color:#9B8B7E;margin-bottom:28px}
    input{width:100%;padding:12px 16px;border:1px solid #D9CEBD;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:15px;margin-bottom:12px;background:white;color:#2D1F14;outline:none}
    input:focus{border-color:#C4704B}
    .btn{width:100%;padding:12px;background:#2D1F14;color:white;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:opacity 0.2s}
    .btn:hover{opacity:0.9}
    .btn:disabled{opacity:0.5;cursor:not-allowed}
    .error{color:#C4704B;font-size:13px;margin-bottom:12px;display:none}
    .success{color:#7A8B6F;font-size:14px;line-height:1.6;display:none}
    .back{font-size:13px;color:#9B8B7E;margin-top:16px;display:block}
    .back a{color:#C4704B;text-decoration:none}
  </style>
</head>
<body>
<div class="card">
  <div class="brand">Reflekt</div>
  <div class="subtitle" id="subtitle">Set a new password</div>
  <div id="resetForm">
    <input id="newPass" type="password" placeholder="New password (min 6 characters)" autocomplete="new-password" />
    <input id="confirmPass" type="password" placeholder="Confirm new password" autocomplete="new-password" />
    <div class="error" id="error"></div>
    <button class="btn" id="resetBtn" onclick="handleReset()">Reset Password</button>
  </div>
  <div class="success" id="success">
    Your password has been reset! You can now sign in with your new password.
    <div class="back"><a href="/">Go to Reflekt &rarr;</a></div>
  </div>
  <div class="success" id="expired" style="color:#C4704B">
    This reset link is invalid or has expired. Please request a new one.
    <div class="back"><a href="/">Go to Reflekt &rarr;</a></div>
  </div>
</div>
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('expired').style.display = 'block';
    document.getElementById('subtitle').style.display = 'none';
  }

  document.getElementById('confirmPass')?.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleReset(); });

  async function handleReset() {
    const btn = document.getElementById('resetBtn');
    const errEl = document.getElementById('error');
    const pass = document.getElementById('newPass').value;
    const confirm = document.getElementById('confirmPass').value;
    errEl.style.display = 'none';

    if (pass.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return; }
    if (pass !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }

    btn.disabled = true; btn.textContent = 'Resetting...';
    try {
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pass })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('subtitle').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } else {
        if (data.error && data.error.includes('expired')) {
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('subtitle').style.display = 'none';
          document.getElementById('expired').style.display = 'block';
        } else {
          errEl.textContent = data.error || 'Reset failed.';
          errEl.style.display = 'block';
        }
      }
    } catch (e) {
      errEl.textContent = 'Connection error. Try again.';
      errEl.style.display = 'block';
    }
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
</script>
</body>
</html>
